project_name: terraform-provider-procurator

before:
  hooks:
    - go mod tidy
    - mkdir -p internal/client/certs
    - sh -c 'if [ -n "$CA_CERT" ]; then printf "%s" "$CA_CERT" > internal/client/certs/procurator-root-ca.pem; fi'

builds:
  - id: provider
    main: .
    binary: "{{ .ProjectName }}_v{{ .Version }}"
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: provider
    builds:
      - provider
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: LICENSE*
      - src: README*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--yes"
      - "--detach-sign"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "${artifact}"

release:
  github:
    owner: ErmilovAlexander
    name: terraform-provider-procurator
  draft: false
  prerelease: false
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"